<script>
function generateIcon(){
  const c=document.createElement('canvas');c.width=180;c.height=180;
  const ctx=c.getContext('2d');
  ctx.fillStyle='#461D7C';
  ctx.beginPath();ctx.roundRect(0,0,180,180,36);ctx.fill();
  ctx.fillStyle='#fff';
  const s=1.8;const ox=0,oy=10;
  // head
  ctx.beginPath();ctx.arc(50*s+ox,12*s+oy,9*s,0,Math.PI*2);ctx.fill();
  // neck
  ctx.beginPath();ctx.roundRect(46*s+ox,20*s+oy,8*s,6*s,2*s);ctx.fill();
  // torso
  ctx.beginPath();ctx.moveTo(30*s+ox,26*s+oy);ctx.quadraticCurveTo(50*s+ox,22*s+oy,70*s+ox,26*s+oy);ctx.lineTo(66*s+ox,58*s+oy);ctx.quadraticCurveTo(50*s+ox,62*s+oy,34*s+ox,58*s+oy);ctx.closePath();ctx.fill();
  // left upper arm
  ctx.beginPath();ctx.moveTo(30*s+ox,28*s+oy);ctx.lineTo(14*s+ox,44*s+oy);ctx.quadraticCurveTo(12*s+ox,47*s+oy,14*s+ox,50*s+oy);ctx.lineTo(20*s+ox,50*s+oy);ctx.lineTo(34*s+ox,36*s+oy);ctx.closePath();ctx.fill();
  // left forearm
  ctx.beginPath();ctx.moveTo(14*s+ox,44*s+oy);ctx.lineTo(8*s+ox,32*s+oy);ctx.quadraticCurveTo(7*s+ox,29*s+oy,10*s+ox,28*s+oy);ctx.lineTo(13*s+ox,28*s+oy);ctx.lineTo(20*s+ox,42*s+oy);ctx.closePath();ctx.fill();
  // right upper arm
  ctx.beginPath();ctx.moveTo(70*s+ox,28*s+oy);ctx.lineTo(86*s+ox,44*s+oy);ctx.quadraticCurveTo(88*s+ox,47*s+oy,86*s+ox,50*s+oy);ctx.lineTo(80*s+ox,50*s+oy);ctx.lineTo(66*s+ox,36*s+oy);ctx.closePath();ctx.fill();
  // right forearm
  ctx.beginPath();ctx.moveTo(86*s+ox,44*s+oy);ctx.lineTo(92*s+ox,32*s+oy);ctx.quadraticCurveTo(93*s+ox,29*s+oy,90*s+ox,28*s+oy);ctx.lineTo(87*s+ox,28*s+oy);ctx.lineTo(80*s+ox,42*s+oy);ctx.closePath();ctx.fill();
  // barbell bar
  ctx.beginPath();ctx.roundRect(4*s+ox,26*s+oy,92*s,5*s,2.5*s);ctx.fill();
  // weight plates
  ctx.beginPath();ctx.roundRect(0*s+ox,20*s+oy,8*s,17*s,3*s);ctx.fill();
  ctx.beginPath();ctx.roundRect(7*s+ox,22*s+oy,5*s,13*s,2*s);ctx.fill();
  ctx.beginPath();ctx.roundRect(88*s+ox,22*s+oy,5*s,13*s,2*s);ctx.fill();
  ctx.beginPath();ctx.roundRect(92*s+ox,20*s+oy,8*s,17*s,3*s);ctx.fill();
  // legs
  ctx.beginPath();ctx.moveTo(34*s+ox,58*s+oy);ctx.lineTo(28*s+ox,88*s+oy);ctx.quadraticCurveTo(27*s+ox,92*s+oy,31*s+ox,93*s+oy);ctx.lineTo(37*s+ox,93*s+oy);ctx.lineTo(42*s+ox,62*s+oy);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(66*s+ox,58*s+oy);ctx.lineTo(72*s+ox,88*s+oy);ctx.quadraticCurveTo(73*s+ox,92*s+oy,69*s+ox,93*s+oy);ctx.lineTo(63*s+ox,93*s+oy);ctx.lineTo(58*s+ox,62*s+oy);ctx.closePath();ctx.fill();
  // feet
  ctx.beginPath();ctx.ellipse(32*s+ox,95*s+oy,8*s,4*s,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(68*s+ox,95*s+oy,8*s,4*s,0,0,Math.PI*2);ctx.fill();
  document.getElementById('apple-touch-icon').href=c.toDataURL('image/png');
  document.getElementById('favicon').href=c.toDataURL('image/png');
}
document.addEventListener('DOMContentLoaded', generateIcon);

const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvaGt3Z2Vwc3BxZ2pxY3J0Y3VnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1NDg4NzQsImV4cCI6MjA5NzEyNDg3NH0.JfEoMpCevqpHuTmmFOrSG6jsiSEgHcPjqHY-md-Bfcg';

const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const GOALS = { calories:2400, protein:175, carbs:190, fat:100 };
const DEFAULT_LIBRARY = [
  { id:'smoothie-breakfast', name:'Regular breakfast smoothie', calories:561, protein:70, carbs:36, fat:21,
    notes:'Oikos Pro 5.3oz, 6oz raw milk, 2 eggs, 30g Premier Protein, 10g creatine, 1 tsp psyllium husk, 8 frozen strawberries' },
  { id:'perfect-amino', name:'Perfect Amino (BodyHealth)', calories:2, protein:15, carbs:0, fat:0,
    notes:'1 serving (5 tablets or 1 scoop) — essential amino acids, near-zero caloric impact' },
];
const TABS = [

  {id:'diet',label:'Diet',icon:'🥗'},
  {id:'weight',label:'Weight',icon:'⚖'},

  {id:'history',label:'Workout History',icon:'📋'},
];

// ── Supabase API ───────────────────────────────────────────────────────────
async function sb(method, table, body=null, params='') {
  const url = `${SUPABASE_URL}/rest/v1/${table}${params}`;
  const headers = {
    'Content-Type':'application/json',
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${SUPABASE_KEY}`,
    'Prefer': method==='POST'?'return=representation':'return=representation',
  };
  if(method==='GET') delete headers['Content-Type'];
  const res = await fetch(url, { method, headers, body: body ? JSON.stringify(body) : null });
  if(!res.ok) { const e=await res.text(); throw new Error(e); }
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

async function sbGet(table, params='') { return sb('GET', table, null, params); }
async function sbPost(table, body) { return sb('POST', table, body); }
async function sbPatch(table, body, params) { return sb('PATCH', table, body, params); }
async function sbDelete(table, params) { return sb('DELETE', table, null, params); }
async function sbUpsert(table, body) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
    method:'POST',
    headers:{ 'Content-Type':'application/json', 'apikey':SUPABASE_KEY, 'Authorization':`Bearer ${SUPABASE_KEY}`, 'Prefer':'resolution=merge-duplicates,return=representation' },
    body: JSON.stringify(body)
  });
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

// ── State ──────────────────────────────────────────────────────────────────
let currentTab = 'dashboard';
let session = null;
let editingDay = null;
let weightChart = null, dashChart = null, macroHistChart = null;
let saveTimer = null;

let plan = { days: DAYS.map(d=>({name:d,rest:true,exercises:[],cardioExercises:[],rounds:3})) };
let workoutHistory = [];
let meals = [];
let weights = [];
let foodLibrary = [];
let planRowId = null;
let exLibrary = {}; // {name: {description, notes}}
let currentExName = null;
let exDetailChart1 = null, exDetailChart2 = null;
let coachMessages = [];

// ── Helpers ────────────────────────────────────────────────────────────────
function el(id){ return document.getElementById(id); }
function fmtDate(d){ return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function todayStr(){ return new Date().toDateString(); }
function pct(v,g){ return Math.min(100,Math.round(v/g*100)); }
function todayMeals(){ return meals.filter(m=>new Date(m.data.date).toDateString()===todayStr()); }
function macroTotals(list){ return list.reduce((a,m)=>({cal:a.cal+m.data.calories,pro:a.pro+m.data.protein,carb:a.carb+m.data.carbs,fat:a.fat+m.data.fat}),{cal:0,pro:0,carb:0,fat:0}); }
function dayType(day){ return day.rest?'rest':day.cardio?'cardio':'weights'; }
function switchTabByName(name){ switchTab(name); }

function macroBarHTML(label,val,goal,color){
  return `<div class="macro-row"><span class="macro-label">${label}</span><div class="macro-bar-wrap"><div class="macro-bar-fill" style="width:${pct(val,goal)}%;background:${color};"></div></div><span class="macro-val">${val}/${goal}${label!=='Calories'?'g':''}</span></div>`;
}

function showSave(){ const b=el('save-badge');b.style.display='inline-flex';clearTimeout(saveTimer);saveTimer=setTimeout(()=>b.style.display='none',2000); }
function showErr(){ const b=el('err-badge');b.style.display='inline-flex';setTimeout(()=>b.style.display='none',3000); }
function showSpinner(v){ el('sync-spinner').style.display=v?'inline-block':'none'; }

// ── Load all data ──────────────────────────────────────────────────────────
async function loadAll() {
  try {
    const [planRows, histRows, mealRows, weightRows, libRows, coachRows] = await Promise.all([
      sbGet('workout_plan','?order=updated_at.desc&limit=1'),
      sbGet('workout_history','?order=created_at.asc'),
      sbGet('meals','?order=logged_at.desc'),
      sbGet('weights','?order=logged_at.desc'),
      sbGet('food_library','?order=created_at.asc'),
      sbGet('coach_messages','?order=created_at.asc'),
    ]);

    if(planRows.length) {
      plan = planRows[0].data;
      planRowId = planRows[0].id;
      plan.days.forEach(d=>{ if(!d.rounds)d.rounds=3; if(!d.exercises)d.exercises=[]; if(!d.cardioExercises)d.cardioExercises=[]; });
      exLibrary = plan.exLibrary || {};
    }
    workoutHistory = histRows;
    meals = mealRows;
    weights = weightRows;
    foodLibrary = libRows.length ? libRows : DEFAULT_LIBRARY.slice();
    coachMessages = coachRows;
    if(!libRows.length) await seedLibrary();
  } catch(e) {
    console.error('Load error', e);
  }
  el('loading-overlay').style.display='none';
  el('app').style.display='block';
  // Fade out splash screen
  const splash=el('splash-screen');
  if(splash){ splash.classList.add('hidden'); setTimeout(()=>splash.style.display='none',400); }
  buildNav();
  renderDashboard();
}

async function seedLibrary() {
  for(const item of DEFAULT_LIBRARY) {
    try { await sbUpsert('food_library', item); } catch(e){}
  }
  foodLibrary = DEFAULT_LIBRARY.slice();
}

// ── Save plan ──────────────────────────────────────────────────────────────
async function savePlan() {
  showSpinner(true);
  try {
    if(planRowId) {
      await sbPatch('workout_plan',{data:plan,updated_at:new Date().toISOString()},`?id=eq.${planRowId}`);
    } else {
      const rows = await sbPost('workout_plan',{data:plan});
      if(rows&&rows[0]) planRowId=rows[0].id;
    }
    showSave();
  } catch(e){ showErr(); }
  showSpinner(false);
}

// ── Nav ────────────────────────────────────────────────────────────────────
function buildNav() {
  el('nav').innerHTML = TABS.map(t=>`<button class="nav-btn${t.id===currentTab?' active':''}" onclick="switchTab('${t.id}')">${t.icon} ${t.label}</button>`).join('');
}

function switchTab(name) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  currentTab=name;
  el('section-'+name).classList.add('active');
  if(name!=='editor'&&name!=='workout') buildNav();
  window.scrollTo(0,0);
  if(name==='dashboard') renderDashboard();
  if(name==='workout') renderWorkoutPicker();
  if(name==='plan') renderPlan();
  if(name==='diet') renderDiet();
  if(name==='weight') renderWeight();
  if(name==='history') renderHistory();
  if(name==='editor') renderEditor();
  if(name==='coach') renderCoach();
  if(name==='exlibrary') renderExLibrary();
  if(name==='exdetail') renderExDetail();
  // Show/hide FAB — hide on coach tab since we're already there
  const fab=el('coach-fab');
  if(fab) fab.style.display=name==='coach'?'none':'flex';
}

function toggleCoach() {
  if(currentTab==='coach') {
    switchTab('dashboard');
  } else {
    switchTab('coach');

function renderWeightChart(canvasId, small) {
  const canvas=el(canvasId); if(!canvas)return;
  if(canvasId==='dash-chart'&&dashChart){dashChart.destroy();dashChart=null;}
  if(canvasId==='weight-chart'&&weightChart){weightChart.destroy();weightChart=null;}

  // Build last 10 days
  const days=[];
  for(let i=9;i>=0;i--){ const d=new Date();d.setDate(d.getDate()-i);days.push(d.toDateString()); }
  const labels=days.map(d=>new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'}));

  // Find weight entry for each day — use local_date if stored, fall back to logged_at in local time
  const dayData=days.map(d=>{
    const match=weights.find(w=>(w.local_date||new Date(w.logged_at).toDateString())===d);
    return match?match.lbs:null;
  });

  // Color bars: green if down from previous, red if up, gray if no prev
  const barColors=dayData.map((v,i)=>{
    if(v===null) return 'rgba(200,200,200,0.2)';
    const prev=dayData.slice(0,i).reverse().find(x=>x!==null);
    if(prev===undefined) return 'rgba(29,158,117,0.7)';
    return v<=prev?'rgba(29,158,117,0.85)':'rgba(216,90,48,0.85)';
  });

  // Linear trend line across days that have data
  const validPts=dayData.map((v,i)=>v!==null?{i,v}:null).filter(Boolean);
  let trendData=new Array(10).fill(null);
  if(validPts.length>=2){
    const n=validPts.length;
    const sumX=validPts.reduce((a,p)=>a+p.i,0);
    const sumY=validPts.reduce((a,p)=>a+p.v,0);
    const sumXY=validPts.reduce((a,p)=>a+p.i*p.v,0);
    const sumX2=validPts.reduce((a,p)=>a+p.i*p.i,0);
    const slope=(n*sumXY-sumX*sumY)/(n*sumX2-sumX*sumX);
    const intercept=(sumY-slope*sumX)/n;
    trendData=days.map((_,i)=>parseFloat((slope*i+intercept).toFixed(1)));
  }

  // Y axis range
  const allVals=dayData.filter(v=>v!==null);
  const minV=allVals.length?Math.min(...allVals):150;
  const maxV=allVals.length?Math.max(...allVals):200;
  const pad=(maxV-minV)*0.3||2;

  const chart=new Chart(canvas.getContext('2d'),{
    type:'bar',
    data:{
      labels,
      datasets:[
        {
          type:'bar',
          label:'Weight (lbs)',
          data:dayData,
          backgroundColor:barColors,
          borderRadius:4,
          borderSkipped:false,
          datalabels:{
            anchor:'end',
            align:'end',
            formatter:(v)=>v!==null?v:'',
            font:{size:9,weight:'600'},
            color:'#555',
          }
        },
        {
          type:'line',
          label:'Trend',
          data:validPts.length>=2?trendData:new Array(10).fill(null),
          borderColor:'#461D7C',
          borderWidth:2,
          pointRadius:0,
          tension:0.3,
          fill:false,
          datalabels:{display:false},
        }
      ]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      layout:{padding:{top:20}},
      plugins:{
        legend:{display:false},
        tooltip:{
          callbacks:{
            label:ctx=>{
              if(ctx.datasetIndex===1)return` Trend: ${ctx.raw} lbs`;
              return ctx.raw!==null?` ${ctx.raw} lbs`:' No data';
            }
          }
        }
      },
      scales:{
        x:{grid:{display:false},ticks:{font:{size:10},maxRotation:45,autoSkip:false}},
        y:{
          grid:{color:'rgba(0,0,0,0.05)'},
          ticks:{
            font:{size:10},
            stepSize:1,
            callback:v=>Number.isInteger(v)?v+' lbs':'',
          },
          min:Math.floor(minV-pad),
          max:Math.ceil(maxV+pad+1),
        }
      }
    }
  });
  if(canvasId==='dash-chart') dashChart=chart;
  else weightChart=chart;
}

function renderMacroHistChart() {

  for(let i=9;i>=0;i--){ const d=new Date();d.setDate(d.getDate()-i);days.push(d.toDateString()); }
  const labels=days.map(d=>new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'}));
  const dayMeals=d=>meals.filter(m=>new Date(m.data.date).toDateString()===d);
  const calData=days.map(d=>dayMeals(d).reduce((a,m)=>a+m.data.calories,0));
  const proData=days.map(d=>dayMeals(d).reduce((a,m)=>a+m.data.protein,0)*10);
  const carbData=days.map(d=>dayMeals(d).reduce((a,m)=>a+m.data.carbs,0));

  const datasets = macroView==='cp'

        {label:'Protein ×10',data:proData,backgroundColor:proData.map(v=>v===0?'rgba(29,158,117,0.15)':v>=GOALS.protein*10*0.9?'rgba(29,158,117,0.85)':'rgba(29,158,117,0.45)'),borderRadius:4,borderSkipped:false},

        {label:'Fat (g)',data:fatData,backgroundColor:fatData.map(v=>v===0?'rgba(216,90,48,0.15)':v>=GOALS.fat*0.9?'rgba(216,90,48,0.85)':'rgba(216,90,48,0.45)'),borderRadius:4,borderSkipped:false},
      ];

  const tooltipCB = macroView==='cp'
    ? ctx=>ctx.datasetIndex===0?` ${ctx.raw===0?'Not logged':ctx.raw.toLocaleString()+' cal'}`:` ${ctx.raw===0?'Not logged':Math.round(ctx.raw/10)+'g protein'}`
    : ctx=>ctx.datasetIndex===0?` ${ctx.raw===0?'Not logged':ctx.raw+'g carbs'}`:` ${ctx.raw===0?'Not logged':ctx.raw+'g fat'}`;

  const yMax = macroView==='cp' ? 3000 : 350;
  const yTick = macroView==='cp' ? (v=>v.toLocaleString()) : (v=>v+'g');

  macroHistChart=new Chart(canvas.getContext('2d'),{
    type:'bar',

    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},datalabels:{display:false},tooltip:{callbacks:{label:tooltipCB}}},
      scales:{x:{grid:{display:false},ticks:{font:{size:10},maxRotation:45,autoSkip:false}},
              y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:10},callback:yTick},suggestedMax:yMax,min:0}}}
  });
}

function startSession(dayIdx) {
  const day=plan.days[dayIdx]; const type=dayType(day);
  if(type==='cardio'){
    session={dayIdx,dayName:DAYS[dayIdx],date:new Date().toISOString(),type:'cardio',cardioLog:[],sessionStart:Date.now()};
    // Show workout section without nav change
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    el('section-workout').classList.add('active');
    renderCardioSession(); startTimers(); return;
  }
  const rounds=day.rounds||3; const logged={};
  for(let r=1;r<=rounds;r++) logged[r]=day.exercises.map(()=>null);
  session={dayIdx,dayName:DAYS[dayIdx],date:new Date().toISOString(),type:'weights',totalRounds:rounds,currentRound:1,exIdx:0,exercises:day.exercises.map(e=>e.name),logged,sessionStart:Date.now(),roundStart:Date.now(),roundTimes:{}};
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  el('section-workout').classList.add('active');
  renderLiveSession(); startTimers();
}

let timerInterval = null;

function startTimers() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if(!session) { clearInterval(timerInterval); return; }
    const sessionEl = el('timer-session');
    const roundEl = el('timer-round');
    if(sessionEl) sessionEl.textContent = formatTimer(Date.now() - session.sessionStart);
    if(roundEl) roundEl.textContent = formatTimer(Date.now() - session.roundStart);
  }, 1000);
}

function formatTimer(ms) {
  const s = Math.floor(ms/1000);
  const m = Math.floor(s/60);
  const h = Math.floor(m/60);
  if(h>0) return `${h}:${String(m%60).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}

function getLastPerf(exName) {
  for(let i=workoutHistory.length-1;i>=0;i--){
    const h=workoutHistory[i].session; if(!h||!h.logged)continue;
    const maxR=h.plannedRounds||h.totalRounds;
    for(let r=maxR;r>=1;r--){
      const arr=h.logged[r];if(!arr)continue;
      const ei=h.exercises?h.exercises.indexOf(exName):-1;
      if(ei>=0&&arr[ei]){const s=arr[ei];return`Last: ${s.weight?s.weight+' lbs × ':''}${s.reps} reps`;}
    }
  }
  return 'No previous data';
}

      ${roundsWithData.length?`<div style="margin-bottom:0.75rem;">${roundsWithData.map(({r,s})=>`<div class="list-item"><span style="color:#888;font-size:12px;">Round ${r}</span><span style="font-weight:600;">${s.weight?s.weight+' lbs × ':''}${s.reps} reps</span><span class="badge badge-green">Done</span></div>`).join('')}</div>`:'<div style="font-size:13px;color:#aaa;margin-bottom:0.75rem;">Not logged yet this round.</div>'}

        <input type="number" id="set-weight" placeholder="Weight (lbs)" step="2.5" style="width:130px;" value="${roundsWithData.length?roundsWithData[roundsWithData.length-1].s.weight||'':prevSet?prevSet.weight||'':''}">
        <input type="number" id="set-reps" placeholder="Reps" style="width:90px;" value="${roundsWithData.length?roundsWithData[roundsWithData.length-1].s.reps||'':prevSet?prevSet.reps||'':''}">

      </div>

        <button class="btn btn-sm" onclick="prevExercise()">← Prev</button>

function goToExercise(i){session.exIdx=i;renderLiveSession();}
function logSet(){
  const w=parseFloat(el('set-weight').value)||0,r=parseInt(el('set-reps').value)||0;if(!r)return;
  const {currentRound,totalRounds,exIdx,exercises,logged}=session;
  logged[currentRound][exIdx]={weight:w,reps:r};
  const next=logged[currentRound].findIndex((s,i)=>i>exIdx&&s===null);
  if(next>=0){session.exIdx=next;}
  else{
    const complete=logged[currentRound].every(s=>s!==null);
    if(complete&&currentRound<totalRounds){
      // Save round time before advancing
      if(!session.roundTimes) session.roundTimes={};
      session.roundTimes[currentRound]=Date.now()-session.roundStart;
      session.currentRound++;
      session.roundStart=Date.now();
      session.exIdx=0;
    }else{const any=logged[currentRound].findIndex(s=>s===null);if(any>=0)session.exIdx=any;}
  }
  renderLiveSession();
}
function nextExercise(){const{exIdx,exercises,currentRound,totalRounds}=session;if(exIdx<exercises.length-1){session.exIdx++;renderLiveSession();}else if(currentRound<totalRounds){session.currentRound++;session.exIdx=0;renderLiveSession();}}
function prevExercise(){const{exIdx,currentRound,exercises}=session;if(exIdx>0){session.exIdx--;renderLiveSession();}else if(currentRound>1){session.currentRound--;session.exIdx=exercises.length-1;renderLiveSession();}}

async function endSession(){
  clearInterval(timerInterval);
  const{currentRound,totalRounds,logged}=session;
  let roundsCompleted=0;
  for(let r=1;r<=totalRounds;r++){if(logged[r]&&logged[r].every(s=>s!==null))roundsCompleted=r;else break;}
  const anyInCurrent=logged[currentRound]&&logged[currentRound].some(s=>s!==null);
  const partialLabel=roundsCompleted===0&&anyInCurrent?`${currentRound} (partial)`:roundsCompleted||`${currentRound} (partial)`;
  const roundsLabel=roundsCompleted===totalRounds?`${totalRounds} rounds`:`${partialLabel} of ${totalRounds} rounds`;
  // Save final round time
  if(!session.roundTimes) session.roundTimes={};
  session.roundTimes[currentRound]=Date.now()-session.roundStart;
  const totalElapsed=Date.now()-session.sessionStart;
  const completed={...session,totalRounds:roundsCompleted||currentRound,plannedRounds:totalRounds,roundsLabel,totalElapsedMs:totalElapsed,totalElapsedFormatted:formatTimer(totalElapsed),endDate:new Date().toISOString()};
  showSpinner(true);
  try{
    const rows=await sbPost('workout_history',{session:completed});
    if(rows&&rows[0])workoutHistory.push(rows[0]);
    showSave();
  }catch(e){showErr();}
  showSpinner(false);
  session=null; switchTab('history');
}

function logCardioEntry(ei,id,subtype){

let dietDonutChart = null;

function renderDietDonut(t) {
  const canvas = el('diet-donut'); if(!canvas) return;
  const proteinTarget = t.cal > 0 ? Math.round(t.cal / 10) : 0;
  const effPct = proteinTarget > 0 ? Math.round(t.pro / proteinTarget * 100) : 0;
  const effColor = effPct >= 100 ? '#1D9E75' : effPct >= 75 ? '#EF9F27' : '#D85A30';

  const pctEl = el('diet-eff-pct');
  const subEl = el('diet-eff-sub');
  const hintEl = el('diet-eff-hint');

  if(pctEl) { pctEl.textContent = t.cal > 0 ? effPct+'%' : '—'; pctEl.style.color = effColor; }
  if(subEl) subEl.textContent = t.cal > 0 ? `${t.pro}g protein · target ${proteinTarget}g` : 'Log meals to see your score';
  if(hintEl) hintEl.textContent = t.cal === 0 ? '' : effPct >= 100 ? '✓ Protein target met for today\'s calories' : `${proteinTarget - t.pro}g more protein needed`;

  if(dietDonutChart) { dietDonutChart.destroy(); dietDonutChart = null; }
  dietDonutChart = new Chart(canvas.getContext('2d'), {
    type: 'doughnut',
    data: {
      datasets: [{
        data: [Math.min(effPct, 100), Math.max(0, 100 - Math.min(effPct, 100))],
        backgroundColor: [effColor, '#f0f0f0'],
        borderWidth: 0,
        circumference: 280,
        rotation: -140,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '72%',
      plugins: { legend: { display: false }, tooltip: { enabled: false }, datalabels: { display: false } }
    }
  });
}

    aiBtn.querySelectorAll('div').forEach((d,i)=>{d.style.color=i===1?'#222':'#888';});

    Object.assign(aiBtn.style,activeAi);
    aiBtn.querySelectorAll('div').forEach((d,i)=>{d.style.color=i===1?'#461D7C':'#7F77DD';});
    Object.assign(libBtn.style,neutral);
    libBtn.querySelectorAll('div').forEach((d,i)=>{d.style.color=i===1?'#222':'#888';});
  } else {
    Object.assign(libBtn.style,neutral);
    libBtn.querySelectorAll('div').forEach((d,i)=>{d.style.color=i===1?'#222':'#888';});
    Object.assign(aiBtn.style,neutral);
    aiBtn.querySelectorAll('div').forEach((d,i)=>{d.style.color=i===1?'#222':'#888';});
  }
}

async function deleteMeal(id){

async function saveToLibrary(){
  const name=el('meal-name').value.trim();const cal=parseInt(el('meal-cal').value)||0;
  if(!name||!cal){alert('Enter a name and calories first.');return;}
  const item={id:Date.now().toString(),name,calories:cal,protein:parseInt(el('meal-pro').value)||0,carbs:parseInt(el('meal-carb').value)||0,fat:parseInt(el('meal-fat').value)||0,notes:''};

}

async function resetBuiltins(){
  showSpinner(true);
  try{
    for(const item of DEFAULT_LIBRARY) await sbUpsert('food_library',item);
    const defaultIds=DEFAULT_LIBRARY.map(d=>d.id);
    foodLibrary=[...DEFAULT_LIBRARY,...foodLibrary.filter(i=>!defaultIds.includes(i.id))];
    showSave();
  }catch(e){showErr();}
  showSpinner(false);renderLibraryList();
}

async function aiLookup(){
  const q=el('ai-query').value.trim();if(!q)return;
  const btn=el('ai-btn');const errEl=el('ai-error');
  btn.textContent='Looking up…';btn.disabled=true;errEl.style.display='none';
  try{
    const res=await fetch('/api/lookup',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({query:q})
    });
    const parsed=await res.json();
    if(parsed.error) throw new Error(parsed.error);
    el('meal-name').value=parsed.name||q;
    el('meal-cal').value=parsed.calories||'';
    el('meal-pro').value=parsed.protein||'';
    el('meal-carb').value=parsed.carbs||'';
    el('meal-fat').value=parsed.fat||'';
    el('ai-query').value='';
  }catch(e){
    if(errEl){errEl.textContent="Couldn't look that up — "+e.message;errEl.style.display='block';}
  }
  btn.textContent='Look up macros';btn.disabled=false;
}

// ── HISTORY ────────────────────────────────────────────────────────────────
let editingSet = null;
let expandedHistoryIds = new Set();

function toggleHistoryCard(id) {
  if(expandedHistoryIds.has(id)) expandedHistoryIds.delete(id);
  else expandedHistoryIds.add(id);
  renderHistory();
}

function renderHistory(){
  if(!workoutHistory.length){el('section-history').innerHTML='<div class="card"><div style="font-size:13px;color:#888;">No completed workouts yet.</div></div>';return;}

  // Auto-expand the most recent on first render
  const reversed=[...workoutHistory].reverse();
  if(expandedHistoryIds.size===0 && reversed.length) expandedHistoryIds.add(reversed[0].id);

  el('section-history').innerHTML=reversed.map((row,ri)=>{
    const h=row.session;const i=workoutHistory.length-1-ri;
    const date=new Date(row.created_at).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    const isExpanded=expandedHistoryIds.has(row.id);
    const chevron=isExpanded?'▲':'▼';

    if(h.type==='cardio'){
      return`<div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer;" onclick="toggleHistoryCard('${row.id}')">
          <div>
            <div style="font-size:14px;font-weight:600;">${h.dayName} <span class="badge badge-blue">Cardio</span></div>
            <div style="font-size:11px;color:#888;">${date}${h.totalElapsedFormatted?' · ⏱ '+h.totalElapsedFormatted:''} · ${(h.cardioLog||[]).length} exercises</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:12px;color:#aaa;">${chevron}</span>
            <button class="btn btn-danger" onclick="event.stopPropagation();deleteHistory('${row.id}')">✕</button>
          </div>
        </div>
        ${isExpanded?`<div style="margin-top:0.75rem;">
          ${(h.cardioLog||[]).map(entry=>`<div style="margin-bottom:8px;padding:8px;background:#f7f7f5;border-radius:8px;">
            <div style="font-size:13px;font-weight:600;margin-bottom:4px;">${entry.name} <span class="badge badge-${entry.subtype==='walk'?'green':'amber'}">${entry.subtype}</span></div>
            <div style="font-size:12px;color:#666;">${entry.subtype==='walk'?`${entry.distance||'—'} yards · ${entry.duration||'—'} min`:`${entry.quantity||'—'} × ${entry.distance||'—'} yards`}</div>
          </div>`).join('')}
        </div>`:''}
      </div>`;
    }

    const exNames=h.exercises||[];
    const plannedRounds=h.plannedRounds||h.totalRounds;
    return`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer;" onclick="toggleHistoryCard('${row.id}')">
        <div>
          <div style="font-size:14px;font-weight:600;">${h.dayName} <span class="badge badge-purple">Weights</span></div>
          <div style="font-size:11px;color:#888;">${date} · ${h.roundsLabel||h.totalRounds+' rounds'} · ${exNames.length} exercises${h.totalElapsedFormatted?' · ⏱ '+h.totalElapsedFormatted:''}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:12px;color:#aaa;">${chevron}</span>
          <button class="btn btn-danger" onclick="event.stopPropagation();deleteHistory('${row.id}')">✕</button>
        </div>
      </div>
      ${isExpanded?`<div style="margin-top:0.75rem;">
        ${exNames.map((name,ei)=>`
          <div style="margin-bottom:10px;">
            <div style="font-size:13px;font-weight:600;margin-bottom:4px;">${name}</div>
            <div style="display:flex;flex-wrap:wrap;gap:5px;">
              ${Array.from({length:plannedRounds},(_,ri)=>{
                const s=h.logged&&h.logged[ri+1]&&h.logged[ri+1][ei];
                const isEditing=editingSet&&editingSet.rowId===row.id&&editingSet.exIdx===ei&&editingSet.roundIdx===ri;
                if(isEditing){
                  return`<div style="display:flex;align-items:center;gap:5px;background:#EEEDFE;padding:4px 8px;border-radius:8px;">
                    <span style="font-size:11px;color:#534AB7;font-weight:500;">R${ri+1}:</span>
                    <input type="number" id="edit-weight-${ei}-${ri}" value="${s?s.weight||'':''}" placeholder="lbs" style="width:70px;font-size:12px;padding:3px 6px;">
                    <span style="font-size:11px;color:#888;">×</span>
                    <input type="number" id="edit-reps-${ei}-${ri}" value="${s?s.reps||'':''}" placeholder="reps" style="width:55px;font-size:12px;padding:3px 6px;">
                    <button class="btn btn-sm" style="background:#534AB7;color:#fff;border-color:#534AB7;font-size:11px;padding:3px 8px;" onclick="saveSetEdit('${row.id}',${ei},${ri})">✓</button>
                    <button class="btn btn-sm" style="font-size:11px;padding:3px 8px;" onclick="cancelSetEdit()">✕</button>
                  </div>`;
                }
                return`<span style="font-size:12px;background:#f7f7f5;padding:2px 8px;border-radius:6px;color:${s?'#555':'#bbb'};cursor:${s?'pointer':'default'};" ${s?`onclick="event.stopPropagation();startSetEdit('${row.id}',${ei},${ri})" title="Click to edit"`:''}>R${ri+1}: ${s?`${s.weight?s.weight+' lbs × ':''}${s.reps} reps`:'—'}${s?' ✎':''}</span>`;
              }).join('')}
            </div>
          </div>`).join('')}
      </div>`:''}
    </div>`;
  }).join('');
}

function startSetEdit(rowId,exIdx,roundIdx){
  editingSet={rowId,exIdx,roundIdx};
  renderHistory();
}
function cancelSetEdit(){ editingSet=null; renderHistory(); }

async function saveSetEdit(rowId,exIdx,roundIdx){
  const row=workoutHistory.find(w=>w.id===rowId);if(!row)return;
  const weight=parseFloat(el(`edit-weight-${exIdx}-${roundIdx}`).value)||0;
  const reps=parseInt(el(`edit-reps-${exIdx}-${roundIdx}`).value)||0;
  if(!reps){cancelSetEdit();return;}
  const session={...row.session};
  if(!session.logged[roundIdx+1]) session.logged[roundIdx+1]=session.exercises.map(()=>null);
  session.logged[roundIdx+1][exIdx]={weight,reps};
  showSpinner(true);
  try{
    await sbPatch('workout_history',{session},`?id=eq.${rowId}`);
    const idx=workoutHistory.findIndex(w=>w.id===rowId);
    if(idx>=0) workoutHistory[idx]={...workoutHistory[idx],session};
    showSave();
  }catch(e){showErr();}
  showSpinner(false);
  editingSet=null;renderHistory();
}

async function deleteHistory(id){
  if(!confirm('Delete this workout? This cannot be undone.')) return;
  showSpinner(true);
  try{await sbDelete('workout_history',`?id=eq.${id}`);workoutHistory=workoutHistory.filter(w=>w.id!==id);showSave();}catch(e){showErr();}
  showSpinner(false);renderHistory();
}

      <div class="row" style="margin-top:0.75rem;"><input type="text" id="new-cardio-ex" placeholder="Exercise name" style="flex:2;"><select id="new-cardio-type" style="width:90px;padding:6px 8px;font-size:12px;"><option value="walk">Walk</option><option value="sprint">Sprint</option></select><button class="btn btn-primary" onclick="addCardioEx()">Add</button></div>

function setDayType(i,type){
  plan.days[i].rest=(type==='rest');plan.days[i].cardio=(type==='cardio');
  if(!plan.days[i].exercises)plan.days[i].exercises=[];
  if(!plan.days[i].cardioExercises)plan.days[i].cardioExercises=[];
  if(!plan.days[i].rounds)plan.days[i].rounds=3;
  if(editingDay===i)editingDay=null;
  savePlan();renderEditor();
}
function updateRounds(i,val){plan.days[i].rounds=parseInt(val)||3;savePlan();}

async function exportAll() {
  // Dynamically load SheetJS
  if(!window.XLSX) {
    await new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
      s.onload = resolve; s.onerror = reject;
      document.head.appendChild(s);
    });
  }

  const wb = XLSX.utils.book_new();

  // ── Meals sheet ──
  const mealData = [['Date','Meal Time','Name','Calories','Protein (g)','Carbs (g)','Fat (g)']];
  meals.forEach(m => {
    mealData.push([
      new Date(m.data.date).toLocaleDateString('en-US'),
      m.data.time, m.data.name,
      m.data.calories, m.data.protein, m.data.carbs, m.data.fat
    ]);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(mealData), 'Meals');

  // ── Weights sheet ──
  const weightData = [['Date','Weight','Unit','lbs','Note']];
  weights.forEach(w => {
    weightData.push([
      new Date(w.logged_at).toLocaleDateString('en-US'),
      w.value, w.unit, w.lbs, w.note||''
    ]);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(weightData), 'Weights');

  // ── Workout History sheet ──
  const workoutData = [['Date','Day','Type','Rounds','Duration','Exercise','Round','Weight (lbs)','Reps','Cardio Type','Distance (yards)','Walk Duration (min)','Sprints']];
  workoutHistory.forEach(row => {
    const h = row.session;
    const date = new Date(row.created_at).toLocaleDateString('en-US');
    if(h.type === 'cardio') {
      (h.cardioLog||[]).forEach(entry => {
        workoutData.push([date, h.dayName, 'Cardio', '', h.totalElapsedFormatted||'',
          entry.name, '', '', '', entry.subtype,
          entry.distance||'', entry.duration||'', entry.quantity||'']);
      });
      if(!(h.cardioLog||[]).length)
        workoutData.push([date, h.dayName, 'Cardio', '', h.totalElapsedFormatted||'', '', '', '', '', '', '', '', '']);
    } else {
      const exNames = h.exercises||[];
      const plannedRounds = h.plannedRounds||h.totalRounds||1;
      exNames.forEach((name, ei) => {
        for(let r=1;r<=plannedRounds;r++) {
          const s = h.logged&&h.logged[r]&&h.logged[r][ei];
          workoutData.push([date, h.dayName, 'Weights', h.roundsLabel||'',
            h.totalElapsedFormatted||'', name, `Round ${r}`,
            s?s.weight||'':'', s?s.reps||'':'', '', '', '', '']);
        }
      });
      if(!exNames.length)
        workoutData.push([date, h.dayName, 'Weights', h.roundsLabel||'', h.totalElapsedFormatted||'', '', '', '', '', '', '', '', '']);
    }
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(workoutData), 'Workout History');

  // ── Food Library sheet ──
  const libData = [['Name','Calories','Protein (g)','Carbs (g)','Fat (g)','Notes']];
  foodLibrary.forEach(item => {
    libData.push([item.name, item.calories, item.protein, item.carbs, item.fat, item.notes||'']);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(libData), 'Food Library');

  // Download
  const date = new Date().toLocaleDateString('en-US').replace(/\//g,'-');
  XLSX.writeFile(wb, `AndyMartinFitness_${date}.xlsx`);
}

async function sendCoachMessage() {
  const inp=el('coach-input');
  const text=inp?inp.value.trim():'';
  if(!text)return;
  inp.value='';

  // Save to Supabase and local state
  showSpinner(true);
  try{ const rows=await sbPost('coach_messages',{role:'user',content:text}); if(rows&&rows[0])coachMessages.push(rows[0]); }catch(e){}

  // Show user message immediately
  renderCoach();
  const sendBtn=el('coach-send');
  if(sendBtn){sendBtn.textContent='…';sendBtn.disabled=true;}

  // Show typing indicator
  const msgs=el('coach-messages');
  if(msgs){
    const typing=document.createElement('div');
    typing.id='typing-indicator';
    typing.style.cssText='display:flex;justify-content:flex-start;margin-bottom:10px;';
    typing.innerHTML='<div style="padding:10px 14px;border-radius:16px 16px 16px 4px;background:#fff;border:1px solid #e5e5e5;font-size:14px;color:#888;">Thinking…</div>';
    msgs.appendChild(typing);
    window.scrollTo(0, document.body.scrollHeight);
  }

  try {
    const apiMessages = coachMessages.map(m=>({role:m.role,content:m.content}));
    const res=await fetch('/api/coach',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ messages: apiMessages, context: buildContext() })
    });
    const data=await res.json();
    if(data.error) throw new Error(data.error);

    // Store meal data on the message if present
    const content = data.reply;
    const extra = data.mealData ? JSON.stringify(data.mealData) : null;

    const rows=await sbPost('coach_messages',{role:'assistant',content,extra});
    if(rows&&rows[0]) coachMessages.push({...rows[0], mealData: data.mealData||null});
    showSave();
  } catch(e) {
    const rows=await sbPost('coach_messages',{role:'assistant',content:'Sorry, I had trouble responding. Please try again.'});
    if(rows&&rows[0]) coachMessages.push(rows[0]);
    showErr();
  }
  showSpinner(false);
  renderCoach();
}

function getAllExerciseNames() {
  const names = new Set();
  plan.days.forEach(d => {
    (d.exercises||[]).forEach(e => names.add(e.name));
  });
  // Also pull from workout history
  workoutHistory.forEach(row => {
    (row.session.exercises||[]).forEach(n => names.add(n));
  });
  return [...names].sort();
}

function getExerciseHistory(exName) {
  // Returns array of {date, sets:[{weight,reps}], volume, maxWeight, maxReps}
  const results = [];
  [...workoutHistory].forEach(row => {
    const h = row.session;
    if(h.type === 'cardio' || !h.exercises) return;
    const ei = h.exercises.indexOf(exName);
    if(ei < 0) return;
    const plannedRounds = h.plannedRounds || h.totalRounds || 1;
    const sets = [];
    for(let r = 1; r <= plannedRounds; r++) {
      const s = h.logged && h.logged[r] && h.logged[r][ei];
      if(s && s.reps) sets.push({weight: s.weight||0, reps: s.reps, round: r});
    }
    if(!sets.length) return;
    const volume = sets.reduce((a, s) => a + (s.weight||0) * s.reps, 0);
    const maxWeight = Math.max(...sets.map(s => s.weight||0));
    const maxReps = Math.max(...sets.map(s => s.reps));
    results.push({
      date: new Date(row.created_at),
      dateStr: fmtDate(row.created_at),
      sets, volume, maxWeight, maxReps,
      sessionId: row.id
    });
  });
  return results.sort((a,b) => a.date - b.date);
}

function startRenameExCard(btn) {
  const name = getCardName(btn);
  if(!name) return;
  window._renamingEx = name;
  renderExLibrary();
  setTimeout(() => { const inp = el('rename-input'); if(inp) inp.focus(); }, 50);
}

function saveRenameExById(inp) {
  const card = inp.closest('[data-exname]');
  const oldName = card ? card.getAttribute('data-exname') : null;
  if(!oldName) return;
  const newName = inp.value.trim();
  if(!newName || newName === oldName) { cancelRenameEx(); return; }
  if(exLibrary[oldName]) exLibrary[newName] = {...exLibrary[oldName]};
  delete exLibrary[oldName];
  if(!plan.exLibrary) plan.exLibrary = {};
  if(plan.exLibrary[oldName]) plan.exLibrary[newName] = {...plan.exLibrary[oldName]};
  delete plan.exLibrary[oldName];
  plan.days.forEach(d => {
    (d.exercises||[]).forEach(e => { if(e.name === oldName) e.name = newName; });
  });
  savePlan();
  window._renamingEx = null;
  renderExLibrary();
}

function cancelRenameEx() {
  window._renamingEx = null;
  renderExLibrary();
}

function deleteExCard(btn) {
  const name = getCardName(btn);
  if(!name) return;
  const hist = getExerciseHistory(name);
  const msg = hist.length
    ? 'Delete "' + name + '" from the library? This won't delete its workout history (' + hist.length + ' sessions), but it will be removed from any workout days in your plan.'
    : 'Delete "' + name + '" from the library? It will also be removed from any workout days in your plan.';
  if(!confirm(msg)) return;
  delete exLibrary[name];
  if(plan.exLibrary) delete plan.exLibrary[name];
  plan.days.forEach(d => {
    if(d.exercises) d.exercises = d.exercises.filter(e => e.name !== name);
  });
  savePlan();
  renderExLibrary();
}

function addLibraryExercise() {
  const inp = el('new-lib-ex');
  const name = inp ? inp.value.trim() : '';
  if(!name) return;
  if(!exLibrary[name]) exLibrary[name] = {description:'', notes:''};
  if(!plan.exLibrary) plan.exLibrary = {};
  plan.exLibrary[name] = exLibrary[name];
  savePlan();
  inp.value = '';
  renderExLibrary();
}

function getTrend(hist) {
  if(hist.length < 3) return null;
  const recent = hist.slice(-3).map(h => h.maxWeight);
  const avg1 = recent.slice(0,2).reduce((a,v)=>a+v,0)/2;
  const avg2 = recent[2];
  const diff = avg2 - avg1;
  if(diff > 2) return {icon:'📈', label:'Weight trending up'};
  if(diff < -2) return {icon:'📉', label:'Weight trending down'};
  return {icon:'➡️', label:'Weight holding steady'};
}

  const lastSession = hist.length ? hist[hist.length-1] : null;
  const trend = getTrend(hist);

  el('section-exdetail').innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem;">
      <button class="btn btn-sm" onclick="switchTab('exlibrary')">← Library</button>
      <span style="font-size:16px;font-weight:600;">${name}</span>
    </div>

    <!-- Description card -->
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.5rem;">
        <div class="card-title" style="margin-bottom:0;">About this exercise</div>
        <button class="btn btn-sm" onclick="editExDescription('${name.replace(/'/g,"\'")}')" id="ex-edit-btn">✎ Edit</button>
      </div>
      <div id="ex-desc-view">
        ${lib.description
          ? `<div style="font-size:13px;color:#444;margin-bottom:6px;">${lib.description}</div>`
          : `<div style="font-size:13px;color:#bbb;margin-bottom:6px;">No description yet — tap Edit to add one.</div>`}
        ${lib.notes ? `<div style="font-size:12px;color:#888;background:#f7f7f5;border-radius:8px;padding:8px 10px;">${lib.notes}</div>` : ''}
      </div>
      <div id="ex-desc-edit" style="display:none;">
        <div style="margin-bottom:8px;"><label style="font-size:11px;color:#888;font-weight:600;display:block;margin-bottom:3px;">DESCRIPTION</label>
          <input type="text" id="ex-desc-input" value="${(lib.description||'').replace(/"/g,'&quot;')}" placeholder="e.g. Compound push movement targeting chest and triceps" style="font-size:13px;"></div>
        <div style="margin-bottom:10px;"><label style="font-size:11px;color:#888;font-weight:600;display:block;margin-bottom:3px;">FORM NOTES</label>
          <textarea id="ex-notes-input" rows="3" style="font-size:13px;border-radius:8px;padding:8px 10px;border:1px solid #ccc;font-family:inherit;width:100%;resize:none;" placeholder="e.g. Keep elbows at 45°, full range of motion, control the descent">${lib.notes||''}</textarea></div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-primary btn-sm" onclick="saveExDescription('${name.replace(/'/g,"\'")}')">Save</button>
          <button class="btn btn-sm" onclick="cancelExDescription()">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Stats row -->
    <div class="metrics" style="margin-bottom:1rem;">
      <div class="metric"><div class="metric-label">🏆 Best Weight</div><div class="metric-value">${pr && pr > 0 ? pr+' lbs' : '—'}</div><div class="metric-sub">${prSession ? prSession.dateStr : ''}</div></div>
      <div class="metric"><div class="metric-label">📅 Sessions</div><div class="metric-value">${hist.length}</div><div class="metric-sub">${lastSession ? 'last '+lastSession.dateStr : 'none yet'}</div></div>
      <div class="metric"><div class="metric-label">📊 Trend</div><div class="metric-value">${trend ? trend.icon : '—'}</div><div class="metric-sub">${trend ? trend.label : 'need 3+ sessions'}</div></div>
      <div class="metric"><div class="metric-label">💪 Last Volume</div><div class="metric-value">${lastSession ? lastSession.volume.toLocaleString() : '—'}</div><div class="metric-sub">${lastSession ? 'lbs total' : ''}</div></div>
    </div>

    ${hist.length >= 2 ? `
    <!-- Weight chart -->
    <div class="card">
      <div class="card-title">Max weight per session</div>
      <div style="position:relative;height:180px;"><canvas id="ex-weight-chart" role="img" aria-label="Weight progression chart"></canvas></div>
    </div>

    <!-- Volume chart -->
    <div class="card">
      <div class="card-title">Volume per session <span style="font-size:11px;color:#aaa;font-weight:400;">(sets × reps × weight)</span></div>
      <div style="position:relative;height:160px;"><canvas id="ex-volume-chart" role="img" aria-label="Volume progression chart"></canvas></div>
    </div>` : hist.length === 1 ? `
    <div class="card" style="text-align:center;padding:1.5rem;">
      <div style="font-size:13px;color:#888;">Complete at least 2 sessions to see progression charts.</div>
    </div>` : `
    <div class="card" style="text-align:center;padding:1.5rem;">
      <div style="font-size:13px;color:#888;">No sessions logged yet for this exercise.</div>
    </div>`}

    <!-- Session log -->
    ${hist.length ? `
    <div class="card">
      <div class="card-title">Session log</div>
      ${[...hist].reverse().map(h => `
        <div style="padding:10px 0;border-bottom:0.5px solid #f0f0f0;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
            <div style="font-size:13px;font-weight:600;">${h.dateStr}</div>
            <div style="font-size:12px;color:#888;">Vol: ${h.volume.toLocaleString()} lbs</div>
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:5px;">
            ${h.sets.map(s => `<span style="font-size:12px;background:#f7f7f5;padding:3px 10px;border-radius:6px;color:#444;">R${s.round}: ${s.weight ? s.weight+' lbs × ' : ''}${s.reps} reps</span>`).join('')}
          </div>
        </div>`).join('')}
    </div>` : ''}`;

  // Draw charts after render
  if(hist.length >= 2) {
    setTimeout(() => {
      drawExWeightChart(hist);
      drawExVolumeChart(hist);
    }, 60);
  }
}

function editExDescription(name) {
  el('ex-desc-view').style.display = 'none';
  el('ex-desc-edit').style.display = 'block';
  el('ex-edit-btn').style.display = 'none';
}
function cancelExDescription() {
  el('ex-desc-view').style.display = 'block';
  el('ex-desc-edit').style.display = 'none';
  el('ex-edit-btn').style.display = '';
}
function saveExDescription(name) {
  const desc = el('ex-desc-input').value.trim();
  const notes = el('ex-notes-input').value.trim();
  if(!exLibrary[name]) exLibrary[name] = {};
  exLibrary[name].description = desc;
  exLibrary[name].notes = notes;
  // Persist to workout_plan data (piggyback on plan save)
  if(!plan.exLibrary) plan.exLibrary = {};
  plan.exLibrary[name] = {description: desc, notes};
  savePlan();
  renderExDetail();
}

function drawExWeightChart(hist) {
  const canvas = el('ex-weight-chart'); if(!canvas) return;
  if(exDetailChart1){exDetailChart1.destroy();exDetailChart1=null;}
  const labels = hist.map(h => h.dateStr);
  const data = hist.map(h => h.maxWeight);

  // Trend line
  const n = hist.length;
  const sumX = hist.reduce((a,_,i)=>a+i,0);
  const sumY = data.reduce((a,v)=>a+v,0);
  const sumXY = hist.reduce((a,_,i)=>a+i*data[i],0);
  const sumX2 = hist.reduce((a,_,i)=>a+i*i,0);
  const slope = (n*sumXY-sumX*sumY)/(n*sumX2-sumX*sumX);
  const intercept = (sumY-slope*sumX)/n;
  const trendData = hist.map((_,i) => parseFloat((slope*i+intercept).toFixed(1)));
  const trendColor = slope > 0.5 ? '#1D9E75' : slope < -0.5 ? '#D85A30' : '#888';

  const minV = Math.min(...data); const maxV = Math.max(...data);
  const pad = (maxV - minV) * 0.3 || 5;

  exDetailChart1 = new Chart(canvas.getContext('2d'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Max weight (lbs)',
          data,
          borderColor: '#461D7C',
          backgroundColor: 'rgba(70,29,124,0.08)',
          borderWidth: 2,
          pointRadius: 5,
          pointBackgroundColor: '#461D7C',
          tension: 0.3,
          fill: true,
          datalabels: { display: true, anchor: 'end', align: 'top', font: {size:10,weight:'600'}, color: '#461D7C', formatter: v => v+' lbs' }
        },
        {
          label: 'Trend',
          data: trendData,
          borderColor: trendColor,
          borderWidth: 1.5,
          borderDash: [4,3],
          pointRadius: 0,
          tension: 0,
          fill: false,
          datalabels: { display: false }
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      layout: { padding: { top: 20 } },
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${ctx.raw} lbs` } } },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 10 }, maxRotation: 45 } },
        y: { grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { font: { size: 10 }, callback: v => v+' lbs' },
             min: Math.floor(minV - pad), max: Math.ceil(maxV + pad) }
      }
    }
  });
}

function drawExVolumeChart(hist) {
  const canvas = el('ex-volume-chart'); if(!canvas) return;
  if(exDetailChart2){exDetailChart2.destroy();exDetailChart2=null;}
  const labels = hist.map(h => h.dateStr);
  const data = hist.map(h => h.volume);
  const maxV = Math.max(...data);

  exDetailChart2 = new Chart(canvas.getContext('2d'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Volume',
        data,
        backgroundColor: data.map((v,i) => {
          if(i===0) return 'rgba(83,74,183,0.6)';
          return v >= data[i-1] ? 'rgba(29,158,117,0.75)' : 'rgba(216,90,48,0.75)';
        }),
        borderRadius: 4,
        borderSkipped: false,
        datalabels: { display: false }
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${ctx.raw.toLocaleString()} lbs volume` } } },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 10 }, maxRotation: 45 } },
        y: { grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { font: { size: 10 }, callback: v => v.toLocaleString() }, min: 0, suggestedMax: maxV * 1.15 }
      }
    }
  });
}

// ── INIT ───────────────────────────────────────────────────────────────────
loadAll();
</script>
